<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Base Gradient -->
  <rect width="1920" height="1080" fill="url(#heroGradient)"/>
  
  <!-- Glow Effects -->
  <circle cx="1600" cy="200" r="400" fill="url(#glowGradient)"/>
  <circle cx="300" cy="800" r="350" fill="url(#glowGradient)"/>
  
  <!-- Snooker Table Silhouette -->
  <g opacity="0.15">
    <rect x="400" y="300" width="1120" height="560" rx="20" fill="#047857" stroke="#065f46" stroke-width="8"/>
    <rect x="420" y="320" width="1080" height="520" rx="10" fill="#059669"/>
    
    <!-- Pockets -->
    <circle cx="440" cy="340" r="25" fill="#1f2937"/>
    <circle cx="960" cy="340" r="25" fill="#1f2937"/>
    <circle cx="1480" cy="340" r="25" fill="#1f2937"/>
    <circle cx="440" cy="860" r="25" fill="#1f2937"/>
    <circle cx="960" cy="860" r="25" fill="#1f2937"/>
    <circle cx="1480" cy="860" r="25" fill="#1f2937"/>
    
    <!-- Balls -->
    <circle cx="700" cy="600" r="20" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
    <circle cx="850" cy="550" r="20" fill="#ef4444"/>
    <circle cx="900" cy="600" r="20" fill="#fbbf24"/>
    <circle cx="950" cy="650" r="20" fill="#22c55e"/>
    <circle cx="1000" cy="600" r="20" fill="#3b82f6"/>
    <circle cx="1050" cy="550" r="20" fill="#ec4899"/>
    <circle cx="1100" cy="600" r="20" fill="#000000"/>
    
    <!-- Cue Stick -->
    <line x1="500" y1="700" x2="650" y2="580" stroke="#8b4513" stroke-width="8" stroke-linecap="round"/>
    <line x1="500" y1="700" x2="520" y2="685" stroke="#d2691e" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative Dots Pattern -->
  <g opacity="0.1">
    <circle cx="200" cy="200" r="4" fill="#ffffff"/>
    <circle cx="240" cy="200" r="4" fill="#ffffff"/>
    <circle cx="280" cy="200" r="4" fill="#ffffff"/>
    <circle cx="200" cy="240" r="4" fill="#ffffff"/>
    <circle cx="240" cy="240" r="4" fill="#ffffff"/>
    <circle cx="280" cy="240" r="4" fill="#ffffff"/>
    
    <circle cx="1640" cy="880" r="4" fill="#ffffff"/>
    <circle cx="1680" cy="880" r="4" fill="#ffffff"/>
    <circle cx="1720" cy="880" r="4" fill="#ffffff"/>
    <circle cx="1640" cy="920" r="4" fill="#ffffff"/>
    <circle cx="1680" cy="920" r="4" fill="#ffffff"/>
    <circle cx="1720" cy="920" r="4" fill="#ffffff"/>
  </g>
</svg>
